/* ===================== CONFETTI ===================== */
const CONFETTI_DATA = Array.from({length:28},(_,i)=>({
  id:i, left:`${((i*13+7)%97)+1}%`,
  delay:`${(i%8)*0.08}s`,
  dur:`${1.4+(i%5)*0.18}s`,
  color:['#FF6B6B','#4ECDC4','#FFD93D','#845EC2','#6BCB77','#FF9671'][i%6],
  isCircle:i%3!==0, size:8+(i%4)*4,
}));

function Confetti({active}){
  if(!active) return null;
  return <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:999}}>
    {CONFETTI_DATA.map(p=>(
      <div key={p.id} style={{position:'absolute',left:p.left,top:'-30px',
        width:p.size,height:p.size,background:p.color,
        borderRadius:p.isCircle?'50%':3,
        animation:`confettiFall ${p.dur} ease ${p.delay} forwards`}}/>
    ))}
  </div>;
}

/* ===================== STAR COUNTER ===================== */
function StarCounter({stars}){
  return <div style={{display:'flex',alignItems:'center',gap:6,
    background:'linear-gradient(135deg,#FFD93D,#FF9671)',
    padding:'8px 18px',borderRadius:99,
    fontFamily:"'Fredoka One',cursive",fontSize:20,color:'#3d2c00',
    boxShadow:'0 3px 12px rgba(255,200,0,.4)'}}>

}

/* ===================== BACK BUTTON ===================== */
function BackBtn({onBack}){

    style={{background:'#f0f0f0',color:'#555',padding:'10px 20px',fontSize:15,borderRadius:14,boxShadow:'0 2px 0 #bbb'}}>
    ← Ana Menü
  </button>;
}

/* ===================== PROGRESS BAR ===================== */
function ProgressBar({current,total}){
  const pct = total>0? Math.round((current/total)*100):0;
  return <div style={{marginBottom:12}}>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,color:'#888',marginBottom:4}}>
      <span>Soru {current} / {total}</span><span>{pct}%</span>
    </div>
    <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
  </div>;
}

/* ===================== RESULT SCREEN ===================== */
function ResultScreen({correct,total,onRetry,onHome}){
  const pct=Math.round((correct/total)*100);
  const emoji= pct>=80?'🎉':pct>=60?'😊':'💪';
  const msg=  pct>=80?'Harika! Çok başarılısın!':pct>=60?'İyi iş! Biraz daha çalış!':'Devam et, başarabilirsin!';
  return <div className="card bounce-in" style={{textAlign:'center',padding:36}}>
    <Confetti active={pct>=80}/>
    <div style={{fontSize:64,marginBottom:12}}>{emoji}</div>
    <div style={{fontFamily:"'Fredoka One',cursive",fontSize:32,color:'#FF6B6B',marginBottom:8}}>{msg}</div>
    <div style={{fontSize:20,color:'#555',marginBottom:6}}>Doğru: <b style={{color:'#6BCB77'}}>{correct}</b> / {total}</div>
    <div style={{fontSize:18,color:'#888',marginBottom:28}}>⭐ {correct} yıldız kazandın!</div>
    <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
      <button className="btn btn-secondary" onClick={onRetry}>🔄 Tekrar Dene</button>
      <button className="btn btn-primary" onClick={onHome}>🏠 Ana Menü</button>
    </div>
  </div>;
}

/* ===================== THERE IS / THERE ARE ===================== */
function ThereIsAreSection({onBack,onComplete}){
  const [idx,setIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [correct,setCorrect]=useState(0);
  const [done,setDone]=useState(false);
  const [shake,setShake]=useState(false);
  const q=THERE_IS_ARE_Qs[idx];

  const pick=(ans)=>{
    if(selected) return;
    setSelected(ans);
    if(ans===q.a){setCorrect(c=>c+1);}
    else{setShake(true);setTimeout(()=>setShake(false),500);}

  const next=()=>{
    if(idx+1>=THERE_IS_ARE_Qs.length){
      onComplete(correct+(selected===q.a?1:0),THERE_IS_ARE_Qs.length);

      {selected && <div style={{marginTop:10,padding:'8px 14px',background:selected===q.a?'#f0fff4':'#fff5f5',

      <ProgressBar current={qIdx+1} total={READING.qs.length}/>
      <div className="card slide-up" style={{marginBottom:14,background:'#f0fff4',border:'2px solid #6BCB7733'}}>
        <div style={{fontSize:17,fontWeight:800,color:'#2d2d2d',marginBottom:6}}>❓ {q.q}</div>
        {selected && <div style={{padding:'8px 12px',background:selected===q.a?'#f0fff4':'#fff5f5',
          borderRadius:10,fontSize:14,fontWeight:700,color:selected===q.a?'#1a6f2a':'#c0392b'}}>
          {selected===q.a?`✅ Doğru! "${q.a}"`:`❌ Yanlış! Doğru: "${q.a}"`}
        </div>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr',gap:8,marginBottom:14}}>
        {q.opts.map(opt=>(
          <button key={opt} className={`btn-option ${selected===opt?(opt===q.a?'correct':'wrong'):''} ${selected&&opt===q.a?'correct':''}`}
            disabled={!!selected} onClick={()=>pick(opt)}>{opt}
          </button>
        ))}
      </div>
      {selected && <button className="btn btn-secondary" style={{width:'100%',justifyContent:'center'}} onClick={next}>
        {qIdx+1>=READING.qs.length?'Sonuçları Gör 🎉':'Sonraki →'}
      </button>}
    </>}
  </div>;
}

/* ===================== FLASHCARDS ===================== */
function FlashCard({card}){
  const [flipped,setFlipped]=useState(false);
  return <div className={`flip-card ${flipped?'flipped':''}`}
    style={{width:'100%',height:140}} onClick={()=>setFlipped(f=>!f)}>
    <div className="flip-card-inner">
      <div className="flip-card-front" style={{background:'linear-gradient(135deg,#fff,#f8f8f8)',
        border:'2px solid #e0e0e0',padding:12}}>
        <div style={{fontSize:36,marginBottom:6}}>{card.emoji}</div>
        <div style={{fontFamily:"'Fredoka One',cursive",fontSize:18,color:'#2d2d2d',textAlign:'center'}}>{card.en}</div>
        <div style={{fontSize:12,color:'#aaa',marginTop:6}}>👆 Çevirmek için dokun</div>
      </div>
      <div className="flip-card-back" style={{background:'linear-gradient(135deg,#845EC2,#c084fc)',padding:12}}>
        <div style={{fontSize:36,marginBottom:6}}>{card.emoji}</div>
        <div style={{fontFamily:"'Fredoka One',cursive",fontSize:20,color:'#fff',textAlign:'center'}}>{card.tr}</div>
        <div style={{fontFamily:"'Fredoka One',cursive",fontSize:14,color:'rgba(255,255,255,.7)',marginTop:4}}>{card.en}</div>
      </div>
    </div>
  </div>;
}

function FlashcardsSection({onBack}){
  const [setKey,setSetKey]=useState('places');
  const [quizMode,setQuizMode]=useState(false);
  const [qIdx,setQIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [correct,setCorrect]=useState(0);
  const [quizDone,setQuizDone]=useState(false);

  const set=FLASHCARD_SETS[setKey];
  const setKeys=Object.keys(FLASHCARD_SETS);

  // Generate quiz questions for current set
  const quizQs=useMemo(()=>{
    const cards=[...set.cards];
    return cards.map(card=>{
      const wrong=set.cards.filter(c=>c.en!==card.en);
      const opts=[card.tr];
      while(opts.length<4&&wrong.length>0){
        const r=wrong.splice(Math.floor(Math.random()*wrong.length),1)[0];
        if(!opts.includes(r.tr)) opts.push(r.tr);
      }
      return {en:card.en,emoji:card.emoji,a:card.tr,opts:opts.sort(()=>Math.random()-.5)};
    });
  },[setKey]);

  const q=quizQs[qIdx];

  const pick=(ans)=>{
    if(selected) return;
    setSelected(ans);
    if(ans===q.a) setCorrect(c=>c+1);
  };
  const nextQ=()=>{
    if(qIdx+1>=quizQs.length){setQuizDone(true);}
    else{setQIdx(i=>i+1);setSelected(null);}
  };

  const startQuiz=(key)=>{
    setSetKey(key);setQuizMode(true);setQIdx(0);setSelected(null);setCorrect(0);setQuizDone(false);
  };

  if(quizDone) return <div>
    <BackBtn onBack={()=>{setQuizMode(false);setQuizDone(false);}}/>
    <div style={{height:14}}/>
    <ResultScreen correct={correct} total={quizQs.length}
      onRetry={()=>{setQIdx(0);setSelected(null);setCorrect(0);setQuizDone(false);}}
      onHome={()=>{setQuizMode(false);setQuizDone(false);}}/>
  </div>;

  if(quizMode) return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <button className="btn" onClick={()=>{setQuizMode(false);setQuizDone(false);}}
        style={{background:'#f0f0f0',color:'#555',padding:'10px 20px',fontSize:15,borderRadius:14,boxShadow:'0 2px 0 #bbb'}}>
        ← Flashcards
      </button>
      <StarCounter stars={correct}/>
    </div>
    <div style={{fontFamily:"'Fredoka One',cursive",fontSize:24,color:set.color,marginBottom:14}}>🧠 {set.title} Quiz</div>
    <ProgressBar current={qIdx+1} total={quizQs.length}/>
    <div className="card slide-up" style={{marginBottom:14,textAlign:'center',padding:28}}>
      <div style={{fontSize:48,marginBottom:8}}>{q.emoji}</div>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:26,color:'#2d2d2d',marginBottom:4}}>{q.en}</div>
      <div style={{fontSize:14,color:'#aaa'}}>Türkçe karşılığını seç</div>
      {selected && <div style={{marginTop:10,padding:'8px 12px',background:selected===q.a?'#f0fff4':'#fff5f5',
        borderRadius:10,fontSize:14,fontWeight:700,color:selected===q.a?'#1a6f2a':'#c0392b'}}>
        {selected===q.a?`✅ Harika! "${q.a}"`:`❌ Yanlış! Doğru: "${q.a}"`}
      </div>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
      {q.opts.map(opt=>(
        <button key={opt} className={`btn-option ${selected===opt?(opt===q.a?'correct':'wrong'):''} ${selected&&opt===q.a?'correct':''}`}
          style={{textAlign:'center',fontSize:15,padding:'13px 8px',borderRadius:14}}
          disabled={!!selected} onClick={()=>pick(opt)}>{opt}
        </button>
      ))}
    </div>
    {selected && <button className="btn btn-yellow" style={{width:'100%',justifyContent:'center'}} onClick={nextQ}>
      {qIdx+1>=quizQs.length?'Sonuçları Gör 🎉':'Sonraki →'}
    </button>}
  </div>;

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <BackBtn onBack={onBack}/>
      <div style={{fontFamily:"'Fredoka One',cursive",fontSize:22,color:'#FFD93D'}}>🃏 Flashcards</div>
    </div>

    {/* Set selector */}
    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
      {setKeys.map(k=>(
        <button key={k} className="btn" onClick={()=>setSetKey(k)}
          style={{fontSize:13,padding:'9px 14px',background:setKey===k?FLASHCARD_SETS[k].color:'#f0f0f0',
            color:setKey===k?'#fff':'#555',borderRadius:12,boxShadow:setKey===k?`0 3px 0 ${FLASHCARD_SETS[k].color}88`:'0 2px 0 #ccc'}}>
          {FLASHCARD_SETS[k].title.split(' ').slice(-1)[0]} {FLASHCARD_SETS[k].title.split(' ').slice(0,-1).join(' ')}
        </button>
      ))}
    </div>

    <div style={{background:`${set.color}18`,borderRadius:20,padding:'14px 16px',marginBottom:14,
      border:`2px solid ${set.color}44`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div>
        <div style={{fontFamily:"'Fredoka One',cursive",fontSize:18,color:set.color}}>{set.title}</div>
        <div style={{fontSize:13,color:'#888'}}>{set.cards.length} kelime • Karta dokun → çevir!</div>
      </div>
      <button className="btn" onClick={()=>startQuiz(setKey)}
        style={{background:set.color,color:'#fff',padding:'10px 16px',fontSize:14,boxShadow:`0 3px 0 ${set.color}88`}}>
        🧠 Quiz!
      </button>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      {set.cards.map((card,i)=>(
        <div key={i} style={{animationDelay:`${i*0.04}s`}} className="slide-up">
          <FlashCard card={card}/>
        </div>
      ))}
    </div>
  </div>;
}

/* ===================== APP ===================== */
function App(){
  const [screen,setScreen]=useState('home');
  const [scores,setScores]=useState({});
  const [totalStars,setTotalStars]=useState(0);

  const addScore=(id,c,t)=>{
    setScores(prev=>{
      const old=prev[id];
      if(old&&old.correct>=c) return prev;
      return {...prev,[id]:{correct:c,total:t}};
    });
    setTotalStars(prev=>prev+c);
  };

  const go=setScreen;
  const goHome=()=>setScreen('home');

  const renderScreen=()=>{
    switch(screen){
      case 'home':         return <HomeScreen onSelect={go} scores={scores} totalStars={totalStars}/>;
      case 'thereis':      return <ThereIsAreSection onBack={goHome} onComplete={(c,t)=>addScore('thereis',c,t)}/>;
      case 'prepositions': return <PrepositionsSection onBack={goHome} onComplete={(c,t)=>addScore('prepositions',c,t)}/>;
      case 'comparisons':  return <ComparisonsSection onBack={goHome} onComplete={(c,t)=>addScore('comparisons',c,t)}/>;
      case 'picture':      return <PictureSection onBack={goHome} onComplete={(c,t)=>addScore('picture',c,t)}/>;
      case 'reading':      return <ReadingSection onBack={goHome} onComplete={(c,t)=>addScore('reading',c,t)}/>;
      case 'flashcards':   return <FlashcardsSection onBack={goHome}/>;
      default:             return <HomeScreen onSelect={go} scores={scores} totalStars={totalStars}/>;
    }
  };

  return <div className="app">{renderScreen()}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
